<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilla — Passkey Authentication</title>
<style>
  :root {
    --bg-primary: #13111C;
    --bg-secondary: #1A1726;
    --bg-tertiary: #221E2E;
    --accent: #E84FAB;
    --accent-hover: #D43D96;
    --text-primary: #E8E4F0;
    --text-secondary: #9B95A8;
    --success: #4ADE80;
    --error: #F87171;
    --border: rgba(232, 228, 240, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px;
    max-width: 440px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  .logo {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), #A855F7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .state { display: none; }
  .state.active { display: block; }

  .state-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .state-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .state-desc {
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  /* Spinner */
  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--bg-tertiary);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Pulse for waiting */
  .pulse-ring {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.15;
    animation: pulse 2s ease-in-out infinite;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pulse-ring .inner {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.15; }
    50% { transform: scale(1.3); opacity: 0.25; }
  }

  /* Success checkmark */
  .checkmark {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--success);
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pop 0.3s ease-out;
  }
  .checkmark svg { width: 32px; height: 32px; }
  @keyframes pop {
    0% { transform: scale(0); }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* Error */
  .error-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--error);
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .error-icon svg { width: 32px; height: 32px; }

  .error-detail {
    background: var(--bg-tertiary);
    border: 1px solid rgba(248, 113, 113, 0.2);
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: var(--error);
    margin-bottom: 16px;
    word-break: break-word;
  }

  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    width: 100%;
  }
  button:hover { background: var(--accent-hover); }
  button:active { transform: scale(0.98); }
  button.secondary {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    margin-top: 8px;
  }
  button.secondary:hover { background: #2A2538; }

  .fade-in {
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Dilla</div>
  <div class="subtitle" id="subtitleText">Secure identity authentication</div>

  <!-- State: Initializing -->
  <div class="state active fade-in" id="stateInit">
    <div class="spinner"></div>
    <div class="state-title">Preparing...</div>
    <div class="state-desc">Setting up the passkey ceremony</div>
  </div>

  <!-- State: Waiting for user -->
  <div class="state fade-in" id="stateWaiting">
    <div class="pulse-ring"><div class="inner"></div></div>
    <div class="state-title" id="waitingTitle">Authenticate with Passkey</div>
    <div class="state-desc" id="waitingDesc">Follow your browser or system prompt to complete authentication.</div>
  </div>

  <!-- State: Success -->
  <div class="state fade-in" id="stateSuccess">
    <div class="checkmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div class="state-title">Authentication Complete</div>
    <div class="state-desc">You can close this tab and return to Dilla.</div>
  </div>

  <!-- State: Error -->
  <div class="state fade-in" id="stateError">
    <div class="error-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
    <div class="state-title">Authentication Failed</div>
    <div class="error-detail" id="errorDetail"></div>
    <button onclick="retry()">Try Again</button>
    <button class="secondary" onclick="window.close()">Cancel</button>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode'); // 'register' or 'login'
  const nonce = params.get('nonce');
  const port = params.get('port');
  const username = params.get('username') || '';
  const prfSaltB64 = params.get('prf_salt') || '';
  const credentialIdsJson = params.get('credential_ids') || '[]';

  const callbackUrl = `http://localhost:${port}/callback`;
  const RP_ID = 'localhost';
  const RP_NAME = 'Dilla';
  const APP_PRF_SALT = new TextEncoder().encode('dilla-prf-v1');

  function showState(id) {
    document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
    const el = document.getElementById(id);
    el.classList.add('active');
    // Re-trigger animation
    el.classList.remove('fade-in');
    el.getAnimations(); // Force reflow to re-trigger animation
    el.classList.add('fade-in');
  }

  function b64ToBytes(b64) {
    // Convert URL-safe base64 back to standard, add padding
    const std = b64.replaceAll('-', '+').replaceAll('_', '/');
    const padded = std + '='.repeat((4 - std.length % 4) % 4);
    return Uint8Array.from(atob(padded), c => c.codePointAt(0));
  }

  function bytesToB64(bytes) {
    let s = '';
    for (const b of bytes) s += String.fromCodePoint(b);
    return btoa(s);
  }

  function bytesToB64Url(bytes) {
    var b64 = bytesToB64(bytes);
    var end = b64.length;
    while (end > 0 && b64[end - 1] === '=') end--;
    return b64.slice(0, end).replaceAll('+', '-').replaceAll('/', '_');
  }

  function b64UrlToBuffer(b64url) {
    const b64 = b64url.replaceAll('-', '+').replaceAll('_', '/');
    const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
    const bin = atob(padded);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.codePointAt(i);
    return bytes.buffer;
  }

  function buildPRFExtension(userSaltBytes) {
    const combined = new Uint8Array(APP_PRF_SALT.length + userSaltBytes.length);
    combined.set(APP_PRF_SALT, 0);
    combined.set(userSaltBytes, APP_PRF_SALT.length);
    return { prf: { eval: { first: combined } } };
  }

  async function doRegister() {
    const prfSaltBytes = b64ToBytes(prfSaltB64);
    const userId = new TextEncoder().encode(username.padEnd(32, '\0').slice(0, 32));
    const challenge = crypto.getRandomValues(new Uint8Array(32));

    const opts = {
      challenge,
      rp: { name: RP_NAME, id: RP_ID },
      user: { id: userId, name: username, displayName: username },
      pubKeyCredParams: [
        { alg: -7, type: 'public-key' },
        { alg: -8, type: 'public-key' },
        { alg: -257, type: 'public-key' },
      ],
      authenticatorSelection: {
        residentKey: 'required',
        userVerification: 'required',
      },
      timeout: 120000,
      extensions: buildPRFExtension(prfSaltBytes),
    };

    showState('stateWaiting');
    document.getElementById('waitingTitle').textContent = 'Register Passkey';
    document.getElementById('waitingDesc').textContent =
      'Choose your passkey provider (Touch ID, 1Password, iCloud Keychain, security key...)';

    const credential = await navigator.credentials.create({ publicKey: opts });
    if (!credential) throw new Error('Registration was cancelled');

    const ext = credential.getClientExtensionResults();
    const prfResults = ext.prf;
    const prfSupported = !!(prfResults?.enabled || prfResults?.results?.first);

    if (!prfResults?.results?.first) {
      throw new Error('This passkey provider does not support encryption (PRF extension). Please try a different provider like iCloud Keychain or a security key.');
    }

    const credentialId = bytesToB64Url(new Uint8Array(credential.rawId));
    const prfOutput = bytesToB64(new Uint8Array(prfResults.results.first));

    // Detect authenticator name
    const ua = navigator.userAgent.toLowerCase();
    let credName = 'Passkey';
    if (ua.includes('mac')) credName = 'Touch ID';
    else if (ua.includes('win')) credName = 'Windows Hello';

    return { credentialId, credentialName: credName, prfOutput, prfSupported };
  }

  async function doLogin() {
    const prfSaltBytes = b64ToBytes(prfSaltB64);
    const credentialIds = JSON.parse(credentialIdsJson);
    const challenge = crypto.getRandomValues(new Uint8Array(32));

    const allowCredentials = credentialIds.map(id => ({
      id: b64UrlToBuffer(id),
      type: 'public-key',
      transports: ['internal', 'hybrid'],
    }));

    const opts = {
      challenge,
      rpId: RP_ID,
      allowCredentials,
      userVerification: 'required',
      timeout: 120000,
      extensions: buildPRFExtension(prfSaltBytes),
    };

    showState('stateWaiting');
    document.getElementById('waitingTitle').textContent = 'Unlock Identity';
    document.getElementById('waitingDesc').textContent =
      'Authenticate with your passkey to unlock your Dilla identity.';

    const assertion = await navigator.credentials.get({ publicKey: opts });
    if (!assertion) throw new Error('Authentication was cancelled');

    const ext = assertion.getClientExtensionResults();
    const prfResults = ext.prf;

    if (!prfResults?.results?.first) {
      throw new Error('PRF output not available. Your passkey provider may not support the encryption extension.');
    }

    const prfOutput = bytesToB64(new Uint8Array(prfResults.results.first));
    return { prfOutput };
  }

  async function sendResult(result) {
    await fetch(callbackUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nonce, ...result }),
    });
  }

  async function run() {
    try {
      let result;
      if (mode === 'register') {
        result = await doRegister();
      } else {
        result = await doLogin();
      }
      await sendResult(result);
      showState('stateSuccess');
      // Try to auto-close after a moment
      setTimeout(() => { try { window.close(); } catch(e) {} }, 2000);
    } catch (err) {
      document.getElementById('errorDetail').textContent = err.message || String(err);
      showState('stateError');
      // Notify the Rust server so it can exit early instead of waiting 120s
      try {
        await fetch(`http://localhost:${port}/error`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ error: err.message || String(err) }),
        });
      } catch (_) { /* server may already be gone */ }
    }
  }

  function retry() {
    showState('stateInit');
    setTimeout(run, 300);
  }

  // Start the ceremony
  run();
</script>
</body>
</html>
