name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Client: test, lint, build ──────────────────────────────────────────────
  client-checks:
    permissions: { contents: read }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Test client with coverage
        run: cd client && npx vitest run --coverage

      - name: Lint client
        run: cd client && npm run lint

      - name: Build client
        run: cd client && npm run build

      - name: Upload client dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.javascript.lcov.reportPaths=client/coverage/lcov.info

  # ── Server: test, build, upload artifact ───────────────────────────────────
  server-checks:
    permissions: { contents: read }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Create dist placeholder for rust-embed
        run: mkdir -p server-rs/dist && touch server-rs/dist/index.html

      - name: Test server
        working-directory: server-rs
        run: cargo test

      - name: Build server (release)
        working-directory: server-rs
        run: cargo build --release

      - name: Upload server binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dilla-server-linux-amd64
          path: server-rs/target/release/dilla-server
          retention-days: 7

  # ── Desktop: build Tauri app artifacts ─────────────────────────────────────
  desktop-build:
    permissions: { contents: read }
    needs: client-checks
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    strategy:
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            args: ''
          - platform: macos-arm64
            os: macos-latest
            args: --target aarch64-apple-darwin
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.platform == 'macos-arm64' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build desktop app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dilla-desktop-${{ matrix.platform }}
          path: |
            client/src-tauri/target/**/release/bundle/**/*.dmg
            client/src-tauri/target/**/release/bundle/**/*.AppImage
            client/src-tauri/target/**/release/bundle/**/*.deb
          retention-days: 7
