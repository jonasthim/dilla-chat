name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Client: test, lint, build ──────────────────────────────────────────────
  client-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Test client
        run: cd client && npm test

      - name: Lint client
        run: cd client && npm run lint

      - name: Build client
        run: cd client && npm run build

      - name: Upload client dist
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7

  # ── Server: test, build, upload artifact ───────────────────────────────────
  server-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Create dist placeholder for rust-embed
        run: mkdir -p server-rs/dist && touch server-rs/dist/index.html

      - name: Test server
        working-directory: server-rs
        run: cargo test

      - name: Build server (release)
        working-directory: server-rs
        run: cargo build --release

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: dilla-server-linux-amd64
          path: server-rs/target/release/dilla-server
          retention-days: 7

  # ── Desktop: build Tauri app artifacts ─────────────────────────────────────
  desktop-build:
    needs: client-checks
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    strategy:
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            args: ''
          - platform: macos-arm64
            os: macos-latest
            args: --target aarch64-apple-darwin
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-arm64' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: dilla-desktop-${{ matrix.platform }}
          path: |
            client/src-tauri/target/**/release/bundle/**/*.dmg
            client/src-tauri/target/**/release/bundle/**/*.AppImage
            client/src-tauri/target/**/release/bundle/**/*.deb
          retention-days: 7
