name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Client: test, lint, build ──────────────────────────────────────────────
  client-checks:
    permissions: { contents: read }
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Test client with coverage
        run: cd client && npx vitest run --coverage

      - name: Lint client
        run: cd client && npm run lint

      - name: Build client
        run: cd client && npm run build

      - name: Upload client dist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-dist
          path: client/dist/
          retention-days: 7

  # ── Server: test + build for all platforms ────────────────────────────────
  server-test:
    permissions: { contents: read }
    needs: client-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: client-dist
          path: server-rs/dist/

      - name: Test server
        working-directory: server-rs
        run: cargo test

  server-build:
    permissions: { contents: read }
    needs: [client-checks, server-test]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            name: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server-rs/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('server-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: client-dist
          path: server-rs/dist/

      - name: Build server (release)
        working-directory: server-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload server binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dilla-server-${{ matrix.name }}
          path: server-rs/target/${{ matrix.target }}/release/dilla-server
          retention-days: 7

  # ── Desktop: build Tauri app artifacts ─────────────────────────────────────
  desktop-build:
    permissions: { contents: read }
    needs: client-checks
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    strategy:
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            args: ''
          - platform: macos-arm64
            os: macos-latest
            args: --target aarch64-apple-darwin
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.platform == 'macos-arm64' && 'aarch64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build desktop app
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: client
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dilla-desktop-${{ matrix.platform }}
          path: |
            client/src-tauri/target/**/release/bundle/**/*.dmg
            client/src-tauri/target/**/release/bundle/**/*.AppImage
            client/src-tauri/target/**/release/bundle/**/*.deb
          retention-days: 7

  # ── Nightly release: always-downloadable artifacts from main ──────────────
  nightly-release:
    permissions: { contents: write }
    needs: [server-build, desktop-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
          pattern: dilla-*
          merge-multiple: true

      - name: Flatten and rename artifacts
        run: |
          mkdir -p release
          for dir in artifacts/dilla-server-*/; do
            name=$(basename "$dir")
            cp "$dir"dilla-server "release/$name" 2>/dev/null || true
          done
          find artifacts -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release/ \;

      - name: Generate SHA256SUMS
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt

      - name: Update nightly release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            Latest build from `main` branch.

            **Commit**: ${{ github.sha }}
            **Date**: ${{ github.event.head_commit.timestamp }}

            These builds are automatically updated on every push to main.
            For stable releases, see the tagged versions.
          prerelease: true
          make_latest: false
          files: release/*
