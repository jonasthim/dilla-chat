name: Claude Auto-fix Issues

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  assign-to-claude:
    # Only run if the issue has the 'auto-fix' label and not already notified
    if: |
      contains(github.event.issue.labels.*.name, 'auto-fix') &&
      !contains(github.event.issue.labels.*.name, 'claude-notified')
    runs-on: ubuntu-latest
    steps:
      - name: Assign issue to Claude Code agent
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Add a comment mentioning Claude Code to trigger it
            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: issue_number,
              body: `@anthropic-code-agent please fix this issue automatically.

            This issue was detected by CI and has been labeled for automatic fixing.

            **Issue type**: ${context.payload.issue.labels.map(l => l.name).join(', ')}

            Please analyze the error and create a PR with the fix.`
            });

            // Add a label to track that Claude has been notified
            await github.rest.issues.addLabels({
              owner: owner,
              repo: repo,
              issue_number: issue_number,
              labels: ['claude-notified']
            });
