name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  issues: write

jobs:
  # Phase 1: Build the web client
  build-client:
    runs-on: ubuntu-latest
    outputs:
      build_failed: ${{ steps.build.outcome == 'failure' }}
      build_output: ${{ steps.build.outputs.output }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci --legacy-peer-deps

      - name: Build client
        id: build
        continue-on-error: true
        run: |
          cd client
          OUTPUT=$(npm run build 2>&1 || true)
          echo "$OUTPUT"
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          npm run build

      - uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: client-dist
          path: client/dist/

  # Phase 2: Build server binaries (matrix)
  build-server:
    needs: build-client
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cc: gcc
            archive: tar.gz
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-13
            cc: clang
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cc: clang
            archive: tar.gz
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cc: x86_64-w64-mingw32-gcc
            archive: zip

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Install cross-compiler (linux/arm64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compiler (windows)
        if: matrix.goos == 'windows'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: server/internal/webapp/dist/

      - name: Determine binary name
        id: binary
        run: |
          NAME="dilla-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            NAME="${NAME}.exe"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Build server binary
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          go build -ldflags "-s -w -X main.version=${VERSION}" -o "${{ steps.binary.outputs.name }}" ./cmd/dilla-server/

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        working-directory: server
        run: tar czf "dilla-server-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "${{ steps.binary.outputs.name }}"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        working-directory: server
        run: zip "dilla-server-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "${{ steps.binary.outputs.name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dilla-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server/dilla-server-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}

  # Phase 3: Create GitHub Release
  release:
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: dilla-server-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum dilla-server-* > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  # Phase 4: Create issues for failures
  create-issues:
    needs: [build-client, build-server, release]
    if: always() && (needs.build-client.outputs.build_failed == 'true' || needs.build-server.result == 'failure' || needs.release.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issue for client build failure
        if: needs.build-client.outputs.build_failed == 'true'
        uses: actions/github-script@v7
        env:
          BUILD_OUTPUT: ${{ needs.build-client.outputs.build_output }}
        with:
          script: |
            const output = process.env.BUILD_OUTPUT;
            const title = '[Auto-fix] Release: Client build failure';
            const body = `## Release Client Build Failure

            The client build failed during release workflow:

            \`\`\`
            ${output}
            \`\`\`

            **Tag**: ${{ github.ref_name }}
            **Commit**: ${{ github.sha }}
            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This issue will be automatically fixed by the auto-fix workflow.
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-fix,build,release'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `New release build failure detected:\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['auto-fix', 'build', 'release', 'client']
              });
            }

      - name: Create issue for server build failure
        if: needs.build-server.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Auto-fix] Release: Server build failure';
            const body = `## Release Server Build Failure

            One or more server builds failed during the release workflow.

            **Tag**: ${{ github.ref_name }}
            **Commit**: ${{ github.sha }}
            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the workflow logs for specific build matrix failures.

            This issue will be automatically fixed by the auto-fix workflow.
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-fix,build,release'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `New server build failure detected:\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['auto-fix', 'build', 'release', 'server']
              });
            }

      - name: Create issue for release failure
        if: needs.release.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Auto-fix] Release: GitHub release creation failure';
            const body = `## Release Creation Failure

            Failed to create the GitHub release.

            **Tag**: ${{ github.ref_name }}
            **Commit**: ${{ github.sha }}
            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the workflow logs for details.

            This may require manual intervention.
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'release'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `New release failure detected:\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['release', 'manual-intervention']
              });
            }

