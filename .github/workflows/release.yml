name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  issues: write

jobs:
  # Phase 1: Build the web client
  build-client:
    runs-on: ubuntu-latest
    outputs:
      build_failed: ${{ steps.build.outcome == 'failure' }}
      build_output: ${{ steps.build.outputs.output }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci

      - name: Build client
        id: build
        continue-on-error: true
        run: |
          cd client
          npm run build

      - uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: client-dist
          path: client/dist/

  # Phase 2: Build Rust server binaries (matrix)
  build-server:
    needs: build-client
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            name_suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            name_suffix: linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
            name_suffix: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            name_suffix: darwin-arm64
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server-rs/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('server-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Validate client build
        run: |
          if [ "${{ needs.build-client.result }}" != "success" ]; then
            echo "Client build failed, cannot proceed with server build"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: server-rs/dist/

      - name: Build server binary
        working-directory: server-rs
        run: |
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/dilla-server dilla-server-${{ matrix.name_suffix }}

      - name: Package (tar.gz)
        working-directory: server-rs
        run: tar czf "dilla-server-${{ matrix.name_suffix }}.tar.gz" "dilla-server-${{ matrix.name_suffix }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dilla-server-${{ matrix.name_suffix }}
          path: server-rs/dilla-server-${{ matrix.name_suffix }}.tar.gz

  # Phase 3: Create GitHub Release
  release:
    needs: build-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: dilla-server-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum dilla-server-* > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  # Phase 4: Create issues for failures
  create-issues:
    needs: [build-client, build-server, release]
    if: always() && (needs.build-client.outputs.build_failed == 'true' || needs.build-server.result == 'failure' || needs.release.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create issue for client build failure
        if: needs.build-client.outputs.build_failed == 'true'
        uses: actions/github-script@v7
        env:
          BUILD_OUTPUT: ${{ needs.build-client.outputs.build_output }}
        with:
          script: |
            const output = process.env.BUILD_OUTPUT;
            const title = '[Auto-fix] Release: Client build failure';
            const body = `## Release Client Build Failure

            The client build failed during release workflow:

            \`\`\`
            ${output}
            \`\`\`

            **Tag**: ${{ github.ref_name }}
            **Commit**: ${{ github.sha }}
            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This issue will be automatically fixed by the auto-fix workflow.
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-fix,build,release'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `New release build failure detected:\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['auto-fix', 'build', 'release', 'client']
              });
            }

      - name: Create issue for server build failure
        if: needs.build-server.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Auto-fix] Release: Server build failure';
            const body = `## Release Server Build Failure

            One or more server builds failed during the release workflow.

            **Tag**: ${{ github.ref_name }}
            **Commit**: ${{ github.sha }}
            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the workflow logs for specific build matrix failures.

            This issue will be automatically fixed by the auto-fix workflow.
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-fix,build,release'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `New server build failure detected:\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['auto-fix', 'build', 'release', 'server']
              });
            }

      - name: Create issue for release failure
        if: needs.release.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Auto-fix] Release: GitHub release creation failure';
            const body = `## Release Creation Failure

            Failed to create the GitHub release.

            **Tag**: ${{ github.ref_name }}
            **Commit**: ${{ github.sha }}
            **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the workflow logs for details.

            This may require manual intervention.
            `;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'release'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `New release failure detected:\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['release', 'manual-intervention']
              });
            }
